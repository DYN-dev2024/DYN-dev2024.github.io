# 基础配置
baseURL: https://DYN-dev2024.github.io/
title: DYN的区块链笔记
theme: hugo-book

# --- 核心优化设置 ---
# 每次构建前自动清理 public 目录，防止旧的搜索索引 JS 文件堆积
cleanDestinationDir: true 

# 开启输出压缩，减小网站体积
minify:
  disableXML: false
  minifyOutput: true
# --------------------

# 禁用不需要的分类功能（标签/分类目录）
disableKinds: ["taxonomy", "taxonomyTerm"]

# Hugo Book 主题配置
disablePathToLower: true
enableGitInfo: true

params:
  # 全局显示目录 (TOC)
  BookShowToC: true

  # 设置侧边栏菜单（使用 /content/menu 目录）
  BookMenuBundle: /menu

  # 搜索功能（生成 en.search.min.js 的源头）
  BookSearch: true

  # 启用 JS 脚本（保持菜单滚动位置等）
  BookEnableJS: true

  # 源代码仓库地址（用于“最后修改”和“编辑此页”链接）
  BookRepo: https://github.com/DYN-dev2024/DYN-dev2024.github.io

  # 启用评论功能
  BookComments: true

  # 日期格式
  BookDateFormat: "2006-01-02"